<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFB Mangaan Attendance System - Demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/all.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container animate__animated animate__fadeIn">
        <div class="login-box">
            <div class="login-logo">
                <div class="logo-icon">
                    <i class="ph ph-users-three"></i>
                </div>
                <h1>AFB Mangaan</h1>
                <p>Attendance & Analytics System</p>
            </div>
            <form class="login-form" onsubmit="event.preventDefault(); window.location.href='demo-dashboard.html';">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" value="admin" readonly>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" value="admin123" readonly>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="ph ph-sign-in"></i> Enter Demo
                </button>
            </form>
            <div class="demo-notice">
                <i class="ph ph-info"></i>
                <span>Demo Mode - No Database Required</span>
            </div>
        </div>
    </div>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .logo-icon i {
            font-size: 40px;
            color: white;
        }
        
        .login-logo h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }
        
        .login-logo p {
            color: #64748b;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.2s;
            background: #f9fafb;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
            background: white;
        }
        
        .btn {
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4);
        }
        
        .btn-block {
            width: 100%;
        }
        
        .demo-notice {
            margin-top: 24px;
            padding: 14px;
            background: #e0e7ff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #4f46e5;
            font-size: 14px;
            justify-content: center;
            font-weight: 500;
        }
        
        .demo-notice i {
            font-size: 18px;
        }
        
        @media (max-width: 480px) {
            .login-box {
                padding: 32px 24px;
            }
            .login-logo h1 {
                font-size: 24px;
            }
        }
    </style>
</body>
</html>
